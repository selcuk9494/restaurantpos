name: POS Desktop Release

on:
  workflow_dispatch:
    inputs:
      build_mac_arm64:
        description: Build macOS arm64 artifact
        type: boolean
        default: true
  push:
    tags:
      - 'pos-v*'

permissions:
  contents: write

jobs:
  mac-arm64:
    if: github.event_name == 'push' || inputs.build_mac_arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dist:pos:mac
      - uses: actions/upload-artifact@v4
        with:
          name: pos-desktop-mac-arm64
          path: apps/pos-web/release/mac/resto-pos-*-arm64.zip

  github-release:
    if: startsWith(github.ref, 'refs/tags/pos-v')
    needs: [mac-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
