name: Device Agent Release

on:
  workflow_dispatch:
    inputs:
      build_mac_arm64:
        description: Build macOS arm64 artifact
        type: boolean
        default: true
      build_mac_x64:
        description: Build macOS x64 artifact
        type: boolean
        default: false
      build_win_x64:
        description: Build Windows x64 artifact
        type: boolean
        default: true
      build_win_arm64:
        description: Build Windows arm64 artifact
        type: boolean
        default: false
  push:
    tags:
      - 'device-agent-v*'

permissions:
  contents: write

jobs:
  mac-arm64:
    if: github.event_name == 'push' || inputs.build_mac_arm64
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: pnpm install --frozen-lockfile
      - name: Build signed macOS arm64 when secrets exist
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            pnpm dist:device-agent:mac:signed
          else
            pnpm dist:device-agent:mac
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: device-agent-mac-arm64
          path: |
            apps/device-agent/release/mac/**/*.zip
            apps/device-agent/release/mac-signed/**/*.zip

  mac-x64:
    if: github.event_name == 'push' || inputs.build_mac_x64
    runs-on: macos-13
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: pnpm install --frozen-lockfile
      - name: Build signed macOS x64 when secrets exist
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            pnpm dist:device-agent:mac:x64:signed
          else
            pnpm dist:device-agent:mac:x64
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: device-agent-mac-x64
          path: |
            apps/device-agent/release/mac-x64/**/*.zip
            apps/device-agent/release/mac-x64-signed/**/*.zip

  win-x64:
    if: github.event_name == 'push' || inputs.build_win_x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: pnpm install --frozen-lockfile
      - name: Build Windows x64 artifact
        shell: pwsh
        env:
          INPUT_WIN_CERT_LINK: ${{ secrets.WIN_CSC_LINK }}
          INPUT_WIN_CERT_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          INPUT_CSC_LINK: ${{ secrets.CSC_LINK }}
          INPUT_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          Remove-Item Env:WIN_CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          if ($env:INPUT_WIN_CERT_LINK) {
            $env:CSC_LINK = $env:INPUT_WIN_CERT_LINK
            $env:CSC_KEY_PASSWORD = $env:INPUT_WIN_CERT_PASSWORD
          } elseif ($env:INPUT_CSC_LINK) {
            $env:CSC_LINK = $env:INPUT_CSC_LINK
            $env:CSC_KEY_PASSWORD = $env:INPUT_CSC_KEY_PASSWORD
          } else {
            Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
            $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          }
          pnpm dist:device-agent:win:x64
      - uses: actions/upload-artifact@v4
        with:
          name: device-agent-win-x64
          path: apps/device-agent/release/win-x64/**/*.exe

  win-arm64:
    if: github.event_name == 'push' || inputs.build_win_arm64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: pnpm install --frozen-lockfile
      - name: Build Windows arm64 artifact
        shell: pwsh
        env:
          INPUT_WIN_CERT_LINK: ${{ secrets.WIN_CSC_LINK }}
          INPUT_WIN_CERT_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          INPUT_CSC_LINK: ${{ secrets.CSC_LINK }}
          INPUT_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          Remove-Item Env:WIN_CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          if ($env:INPUT_WIN_CERT_LINK) {
            $env:CSC_LINK = $env:INPUT_WIN_CERT_LINK
            $env:CSC_KEY_PASSWORD = $env:INPUT_WIN_CERT_PASSWORD
          } elseif ($env:INPUT_CSC_LINK) {
            $env:CSC_LINK = $env:INPUT_CSC_LINK
            $env:CSC_KEY_PASSWORD = $env:INPUT_CSC_KEY_PASSWORD
          } else {
            Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
            $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          }
          pnpm dist:device-agent:win:arm64
      - uses: actions/upload-artifact@v4
        with:
          name: device-agent-win-arm64
          path: apps/device-agent/release/win-arm64/**/*.exe

  github-release:
    if: startsWith(github.ref, 'refs/tags/device-agent-v')
    needs: [mac-arm64, mac-x64, win-x64, win-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
